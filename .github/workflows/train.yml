name: Daily Signature Training

on:
  schedule:
    # 23:00 UTC Mon-Fri (after data update at 22:00)
    - cron: "0 23 * * 1-5"
  workflow_dispatch:
    inputs:
      module:
        description: "Module to run: fi | eq | both"
        required: false
        default: "both"

jobs:
  train-fi:
    name: Train FI / Commodities
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.module == 'fi' ||
      github.event.inputs.module == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sig-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sig-

      - name: Install dependencies
        run: |
          pip install numpy setuptools wheel
          pip install --no-build-isolation iisignature==0.24
          pip install datasets==2.20.0 huggingface_hub==0.23.4 pandas scikit-learn scipy streamlit plotly

      - name: Train FI module
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_fi.py

  train-equity:
    name: Train Equity Sectors
    runs-on: ubuntu-latest
    needs: train-fi
    if: |
      github.event_name == 'schedule' ||
      github.event.inputs.module == 'eq' ||
      github.event.inputs.module == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sig-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sig-

      - name: Install dependencies
        run: |
          pip install numpy setuptools wheel
          pip install --no-build-isolation iisignature==0.24
          pip install datasets==2.20.0 huggingface_hub==0.23.4 pandas scikit-learn scipy streamlit plotly

      - name: Train Equity module
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python train_equity.py
