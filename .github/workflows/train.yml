name: Daily Signature Training

on:
  schedule:
    - cron: "0 23 * * 1-5"
  workflow_dispatch:
    inputs:
      module:
        description: "Module to run: fi | eq | both"
        required: false
        default: "both"

jobs:
  train:
    name: Train ${{ matrix.module }} Module
    runs-on: ubuntu-latest  # Try ubuntu-22.04 for more stability
    timeout-minutes: 120  # Increase timeout
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: fi
            script: train_fi
            output: fi_signal.json
          - module: equity
            script: train_equity
            output: equity_signal.json

    steps:
      - name: Check if should run
        id: check
        run: |
          MODULE="${{ matrix.module }}"
          INPUT="${{ github.event.inputs.module }}"
          EVENT="${{ github.event_name }}"
          
          if [ "$EVENT" == "schedule" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$INPUT" == "$MODULE" ] || [ "$INPUT" == "both" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.should_run == 'true'

      - name: Set up Python 3.11
        if: steps.check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        if: steps.check.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sig-v3-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sig-v3-

      - name: Install dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          pip install --upgrade pip
          pip install numpy setuptools wheel
          pip install esig
          # Skip iisignature to avoid build issues
          pip install datasets==2.20.0 huggingface_hub==0.23.4 pandas scikit-learn scipy streamlit plotly tqdm

      - name: Train ${{ matrix.module }} module
        if: steps.check.outputs.should_run == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          OUTPUT_JSON: ${{ matrix.output }}
          # Limit memory usage
          OPENBLAS_NUM_THREADS: 2
          MKL_NUM_THREADS: 2
          OMP_NUM_THREADS: 2
        run: |
          # Run with memory profiling to catch issues
          python -c "import psutil; print(f'Memory before: {psutil.virtual_memory().percent}%')"
          python ${{ matrix.script }}.py
          python -c "import psutil; print(f'Memory after: {psutil.virtual_memory().percent}%')"

      - name: Upload ${{ matrix.module }} artifact
        if: steps.check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
          retention-days: 1
